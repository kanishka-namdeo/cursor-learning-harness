<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <!-- Accent gradient for text and elements -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow for logo -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="1280" y2="640" stroke-dasharray="5,5"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke-dasharray="5,5"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="80" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1050" cy="550" r="120" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="200" cy="580" r="60" fill="#06b6d4" opacity="0.1"/>

  <!-- Central logo/icon - brain + cursor combined -->
  <g transform="translate(640, 200)" filter="url(#shadow)">
    <!-- Outer hexagon -->
    <polygon points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.8"/>

    <!-- Brain-like circuit pattern -->
    <path d="M-30,-20 Q-20,-40 0,-30 Q20,-40 30,-20 Q40,0 30,20 Q20,40 0,30 Q-20,40 -30,20 Q-40,0 -30,-20 Z"
          fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

    <!-- Connection nodes -->
    <circle cx="-30" cy="-20" r="4" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="30" cy="-20" r="4" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="30" cy="20" r="4" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="-30" cy="20" r="4" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="0" cy="-30" r="4" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="0" cy="30" r="4" fill="#06b6d4" filter="url(#glow)"/>

    <!-- Inner connections -->
    <line x1="-30" y1="-20" x2="0" y2="-30" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="-20" x2="0" y2="-30" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="20" x2="0" y2="30" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="20" x2="0" y2="30" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="-20" x2="30" y2="20" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="30" y1="-20" x2="-30" y2="20" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>

    <!-- Cursor arrow in center -->
    <polygon points="0,-15 -8,10 2,5 -2,15 4,12 8,5 0,15" fill="url(#accentGrad)" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="48" font-weight="700" fill="url(#accentGrad)">
    Cursor Learning Agent
  </text>

  <!-- Subtitle -->
  <text x="640" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400" fill="#94a3b8">
    Self-Improving AI Coding Assistant with LangGraph &amp; LangChain
  </text>

  <!-- Feature tags -->
  <g transform="translate(340, 440)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
    <text x="70" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="500" fill="#60a5fa">Session Recording</text>

    <rect x="160" y="0" width="160" height="36" rx="18" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
    <text x="240" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="500" fill="#a78bfa">AI Summarization</text>

    <rect x="340" y="0" width="160" height="36" rx="18" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="420" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="500" fill="#22d3ee">Sentiment Analysis</text>

    <rect x="520" y="0" width="160" height="36" rx="18" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="600" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="500" fill="#34d399">Self-Improving</text>
  </g>

  <!-- Tech stack badges -->
  <g transform="translate(380, 500)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="40" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">Python</text>

    <rect x="95" y="0" width="90" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="140" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">LangGraph</text>

    <rect x="200" y="0" width="80" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="240" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">LangChain</text>

    <rect x="295" y="0" width="70" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="330" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">SQLite</text>

    <rect x="380" y="0" width="85" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="422" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">Streamlit</text>

    <rect x="480" y="0" width="70" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="515" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">Plotly</text>

    <rect x="565" y="0" width="90" height="28" rx="14" fill="#374151" opacity="0.6"/>
    <text x="610" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="12" font-weight="500" fill="#d1d5db">HuggingFace</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="0" y1="620" x2="1280" y2="620" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
</svg>
