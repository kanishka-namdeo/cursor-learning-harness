<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#logoGrad)" stroke-width="4" opacity="0.3"/>

  <!-- Neural network pattern -->
  <g filter="url(#glow)">
    <!-- Network nodes -->
    <circle cx="180" cy="180" r="8" fill="#3b82f6"/>
    <circle cx="332" cy="180" r="8" fill="#8b5cf6"/>
    <circle cx="332" cy="332" r="8" fill="#06b6d4"/>
    <circle cx="180" cy="332" r="8" fill="#3b82f6"/>
    <circle cx="256" cy="140" r="6" fill="#8b5cf6"/>
    <circle cx="256" cy="372" r="6" fill="#06b6d4"/>
    <circle cx="140" cy="256" r="6" fill="#3b82f6"/>
    <circle cx="372" cy="256" r="6" fill="#8b5cf6"/>

    <!-- Network connections -->
    <line x1="180" y1="180" x2="256" y2="140" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="332" y1="180" x2="256" y2="140" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <line x1="332" y1="332" x2="256" y2="372" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="332" x2="256" y2="372" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="180" x2="140" y2="256" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="332" x2="140" y2="256" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="332" y1="180" x2="372" y2="256" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <line x1="332" y1="332" x2="372" y2="256" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>

    <!-- Cross connections -->
    <line x1="180" y1="180" x2="332" y2="332" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="332" y1="180" x2="180" y2="332" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
    <line x1="256" y1="140" x2="256" y2="372" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
    <line x1="140" y1="256" x2="372" y2="256" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>

    <!-- Center brain circuit -->
    <path d="M220,220 Q230,200 256,210 Q282,200 292,220 Q302,256 292,292 Q282,312 256,302 Q230,312 220,292 Q210,256 220,220 Z"
          fill="none" stroke="url(#logoGrad)" stroke-width="3" opacity="0.7"/>

    <!-- Center cursor arrow -->
    <polygon points="256,230 244,266 254,258 248,278 258,272 268,258 256,268"
             fill="url(#logoGrad)" opacity="0.9"/>
  </g>
</svg>
